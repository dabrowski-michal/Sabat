<form class="sabat-sheet item-sheet weapon-sheet" autocomplete="off">
  <header class="item-header">
    <img class="item-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
    <div class="item-header-fields">
      <h1><input type="text" name="name" value="{{item.name}}" placeholder="Weapon Name" /></h1>
      <div class="item-type-label">Weapon</div>
    </div>
    <a class="edit-toggle" title="Toggle edit mode"><i class="fas fa-lock-open"></i></a>
  </header>

  <section class="item-body">
    <div class="form-grid">

      <div class="field-group">
        <label>Alternative Name</label>
        <input type="text" name="system.alternativeName" value="{{system.alternativeName}}" placeholder="e.g., Espadón" />
      </div>

      <div class="field-group">
        <label>Linked Skill</label>
        <select name="system.skill">
          <option value=""           {{#if (eq system.skill "")}}selected{{/if}}>— None —</option>
          <option value="axes"       {{#if (eq system.skill "axes")}}selected{{/if}}>Axes</option>
          <option value="bows"       {{#if (eq system.skill "bows")}}selected{{/if}}>Bows</option>
          <option value="brawl"      {{#if (eq system.skill "brawl")}}selected{{/if}}>Brawl</option>
          <option value="clubs"      {{#if (eq system.skill "clubs")}}selected{{/if}}>Clubs</option>
          <option value="crossbows"  {{#if (eq system.skill "crossbows")}}selected{{/if}}>Crossbows</option>
          <option value="improvised" {{#if (eq system.skill "improvised")}}selected{{/if}}>Improvised</option>
          <option value="knives"     {{#if (eq system.skill "knives")}}selected{{/if}}>Knives</option>
          <option value="longswords" {{#if (eq system.skill "longswords")}}selected{{/if}}>Longswords</option>
          <option value="maces"      {{#if (eq system.skill "maces")}}selected{{/if}}>Maces</option>
          <option value="shields"    {{#if (eq system.skill "shields")}}selected{{/if}}>Shields</option>
          <option value="slings"     {{#if (eq system.skill "slings")}}selected{{/if}}>Slings</option>
          <option value="spears"     {{#if (eq system.skill "spears")}}selected{{/if}}>Spears</option>
          <option value="swords"     {{#if (eq system.skill "swords")}}selected{{/if}}>Swords</option>
        </select>
      </div>

      <div class="field-group">
        <label>Damage Formula</label>
        <input type="text" name="system.damage" value="{{system.damage}}" placeholder="1d6" />
      </div>

      <div class="field-group">
        <label>Min. Strength</label>
        <input type="number" name="system.minimumStrength" value="{{system.minimumStrength}}" min="0" max="20" />
      </div>

      <div class="field-group">
        <label>Size</label>
        <select name="system.size">
          <option value="Small"  {{#if (eq system.size "Small")}}selected{{/if}}>Small</option>
          <option value="Medium" {{#if (eq system.size "Medium")}}selected{{/if}}>Medium</option>
          <option value="Large"  {{#if (eq system.size "Large")}}selected{{/if}}>Large</option>
        </select>
      </div>

      <div class="field-group">
        <label>Range</label>
        <input type="text" name="system.range" value="{{system.range}}" placeholder="Melee" />
      </div>

      <div class="field-group">
        <label>Reload (actions)</label>
        <input type="number" name="system.reload" value="{{system.reload}}" min="0" />
      </div>

      <div class="field-group">
        <label>Price</label>
        <input type="number" name="system.price" value="{{system.price}}" min="0" />
      </div>

      <div class="field-group checkbox-group">
        <label>Two-Handed</label>
        <input type="checkbox" name="system.twoHanded" {{#if system.twoHanded}}checked{{/if}} />
      </div>

      <div class="field-group checkbox-group">
        <label>Equipped</label>
        <input type="checkbox" name="system.equipped" {{#if system.equipped}}checked{{/if}} />
      </div>

      <div class="field-group">
        <label>Paper Doll Layer</label>
        <select name="system.paperDollLayer">
          <option value=""       {{#if (eq system.paperDollLayer "")}}selected{{/if}}>None</option>
          <option value="weapon" {{#if (eq system.paperDollLayer "weapon")}}selected{{/if}}>Weapon</option>
          <option value="legs"   {{#if (eq system.paperDollLayer "legs")}}selected{{/if}}>Legs</option>
          <option value="boots"  {{#if (eq system.paperDollLayer "boots")}}selected{{/if}}>Boots</option>
          <option value="chest"  {{#if (eq system.paperDollLayer "chest")}}selected{{/if}}>Chest</option>
          <option value="head"   {{#if (eq system.paperDollLayer "head")}}selected{{/if}}>Head</option>
          <option value="hands"  {{#if (eq system.paperDollLayer "hands")}}selected{{/if}}>Hands</option>
        </select>
      </div>

    </div>

    <div class="field-group full-width">
      <label>Description</label>
      <textarea name="system.description" rows="3">{{system.description}}</textarea>
    </div>

    <div class="field-group full-width">
      <label>Special Notes</label>
      <textarea name="system.notes" rows="2">{{system.notes}}</textarea>
    </div>
  </section>
</form>
