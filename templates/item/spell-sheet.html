<form class="sabat-sheet item-sheet spell-sheet" autocomplete="off">
  <header class="item-header">
    <img class="item-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
    <div class="item-header-fields">
      <h1><input type="text" name="name" value="{{item.name}}" placeholder="Spell Name" /></h1>
      <div class="item-type-label">Spell</div>
    </div>
  </header>

  <section class="item-body">

    <!-- Row 1: Latin Name + Spell Nature + CP Cost + Modifier -->
    <div class="spell-top-row">
      <div class="field-group" style="flex:2"><label>Latin Name</label><input type="text" name="system.latinName" value="{{system.latinName}}" placeholder="e.g., Ignis Sacer" /></div>
      {{#if latinDescription}}<div class="field-group" style="flex:2"><label>Spell Nature</label><span class="spell-derived-inline"><em>{{latinDescription}}</em></span></div>{{/if}}
      <div class="field-group" style="flex:1"><label>CP Cost</label><span class="spell-derived-inline">{{cpCost}}</span></div>
      <div class="field-group" style="flex:1"><label>Modifier</label><span class="spell-derived-inline">{{pctMod}}%</span></div>
    </div>

    <!-- Row 2: Vis, Form, Nature, Origin, RR -->
    <div class="spell-selects-row">
      <div class="field-group"><label>Vis</label>
        <select name="system.vis">
          <option value="1" {{#if (eq system.vis 1)}}selected{{/if}}>Prima</option>
          <option value="2" {{#if (eq system.vis 2)}}selected{{/if}}>Secunda</option>
          <option value="3" {{#if (eq system.vis 3)}}selected{{/if}}>Tertia</option>
          <option value="4" {{#if (eq system.vis 4)}}selected{{/if}}>Quarta</option>
          <option value="5" {{#if (eq system.vis 5)}}selected{{/if}}>Quinta</option>
          <option value="6" {{#if (eq system.vis 6)}}selected{{/if}}>Sexta</option>
          <option value="7" {{#if (eq system.vis 7)}}selected{{/if}}>Septima</option>
        </select></div>
      <div class="field-group"><label>Form</label>
        <select name="system.form">
          <option value="" {{#unless system.form}}selected{{/unless}}>—</option>
          <option value="Invocatio"   {{#if (eq system.form "Invocatio")}}selected{{/if}}>Invocatio</option>
          <option value="Maleficium"  {{#if (eq system.form "Maleficium")}}selected{{/if}}>Maleficium</option>
          <option value="Unguentum"   {{#if (eq system.form "Unguentum")}}selected{{/if}}>Unguentum</option>
          <option value="Amuletum"    {{#if (eq system.form "Amuletum")}}selected{{/if}}>Amuletum</option>
          <option value="Potio"       {{#if (eq system.form "Potio")}}selected{{/if}}>Potio</option>
        </select></div>
      <div class="field-group"><label>Nature</label>
        <select name="system.nature">
          <option value="" {{#unless system.nature}}selected{{/unless}}>—</option>
          <option value="Black" {{#if (eq system.nature "Black")}}selected{{/if}}>Black</option>
          <option value="White" {{#if (eq system.nature "White")}}selected{{/if}}>White</option>
        </select></div>
      <div class="field-group"><label>Origin</label>
        <select name="system.origin">
          <option value="" {{#unless system.origin}}selected{{/unless}}>—</option>
          <option value="Folk"       {{#if (eq system.origin "Folk")}}selected{{/if}}>Folk</option>
          <option value="Alchemical" {{#if (eq system.origin "Alchemical")}}selected{{/if}}>Alchemical</option>
          <option value="Infernal"   {{#if (eq system.origin "Infernal")}}selected{{/if}}>Infernal</option>
          <option value="Forbidden"  {{#if (eq system.origin "Forbidden")}}selected{{/if}}>Forbidden</option>
        </select></div>
      <div class="field-group checkbox-group"><label>RR</label><input type="checkbox" name="system.rrAllowed" {{#if system.rrAllowed}}checked{{/if}} /></div>
    </div>

    <!-- Short fields: each on own row -->
    <div class="field-group full-width"><label>Effect</label><input type="text" name="system.effect" value="{{system.effect}}" placeholder="Short effect description" /></div>
    <div class="field-group full-width"><label>Duration</label><input type="text" name="system.duration" value="{{system.duration}}" placeholder="e.g., 1 hour" /></div>
    <div class="field-group full-width"><label>Expiration</label><input type="text" name="system.expiration" value="{{system.expiration}}" placeholder="e.g., Dawn" /></div>

    <!-- Long text fields -->
    <div class="field-group full-width"><label>Components</label><textarea name="system.components" rows="2">{{system.components}}</textarea></div>
    <div class="field-group full-width"><label>Preparation</label><textarea name="system.preparation" rows="2">{{system.preparation}}</textarea></div>
    <div class="field-group full-width"><label>Description</label><textarea name="system.description" rows="8">{{system.description}}</textarea></div>

  </section>
</form>
