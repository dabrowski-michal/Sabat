<form class="aquelarre-sheet item-sheet equipment-sheet" autocomplete="off">
  <header class="item-header">
    <img class="item-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
    <div class="item-header-fields">
      <h1><input type="text" name="name" value="{{item.name}}" placeholder="Equipment Name" /></h1>
      <div class="item-type-label">Equipment</div>
    </div>
  </header>

  <section class="item-body">
    <div class="form-grid">

      <div class="field-group">
        <label>Quantity</label>
        <input type="number" name="system.quantity" value="{{system.quantity}}" min="0" />
      </div>

      <div class="field-group">
        <label>Weight</label>
        <input type="number" name="system.weight" value="{{system.weight}}" min="0" step="0.1" />
      </div>

      <div class="field-group">
        <label>Armor Value</label>
        <input type="number" name="system.armorValue" value="{{system.armorValue}}" min="0" />
      </div>

      <div class="field-group checkbox-group">
        <label>Equipped</label>
        <input type="checkbox" name="system.equipped" {{#if system.equipped}}checked{{/if}} />
      </div>

    </div>

    <div class="field-group full-width">
      <label>Description</label>
      <textarea name="system.description" rows="4">{{system.description}}</textarea>
    </div>
  </section>
</form>
